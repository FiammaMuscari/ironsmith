    function renderSelectOptionsDecision(decision, canAct) {
      const reason = (decision.reason || "").toLowerCase();

      if (reason.includes("order")) {
        renderSelectOptionsOrdering(decision, canAct);
        return;
      }
      if (reason === "distribute") {
        renderSelectOptionsDistribute(decision, canAct);
        return;
      }
      if (reason === "remove counters") {
        renderSelectOptionsCounters(decision, canAct);
        return;
      }
      if ((decision.options || []).some((opt) => opt.repeatable || Number(opt.max_count || 0) > 1)) {
        renderSelectOptionsRepeatable(decision, canAct);
        return;
      }
      if (decision.min === 1 && decision.max === 1) {
        decision.options.forEach((opt) => {
          el.decisionBody.appendChild(
            createActionButton(opt.description, !canAct || !opt.legal, () => {
              sendCommand({ type: "select_options", option_indices: [opt.index] }, `Selected: ${opt.description}`);
            })
          );
        });
        return;
      }

      const form = document.createElement("form");
      form.className = "choice-form";
      const scroll = document.createElement("div");
      scroll.className = "choice-scroll";

      decision.options.forEach((opt) => {
        const row = document.createElement("label");
        row.className = "choice-option";
        row.innerHTML = `
          <input type="checkbox" name="option" value="${opt.index}" ${!opt.legal || !canAct ? "disabled" : ""}>
          <span>${escapeHtml(opt.description)}</span>
        `;
        scroll.appendChild(row);
      });
      form.appendChild(scroll);

      const submit = document.createElement("button");
      submit.type = "submit";
      submit.textContent = "Submit Options";
      submit.disabled = !canAct;
      form.appendChild(submit);

      form.addEventListener("submit", (ev) => {
        ev.preventDefault();
        const selected = Array.from(form.querySelectorAll("input[name='option']:checked"))
          .map((node) => Number(node.value));
        const minChoices = Number(decision.min || 0);
        const maxChoices = Number.isFinite(Number(decision.max)) ? Number(decision.max) : null;
        if (selected.length < minChoices) {
          setStatus(`Select at least ${minChoices} option(s).`, true);
          return;
        }
        if (maxChoices !== null && selected.length > maxChoices) {
          setStatus(`Select at most ${maxChoices} option(s).`, true);
          return;
        }
        sendCommand({ type: "select_options", option_indices: selected }, "Options submitted");
      });

      el.decisionBody.appendChild(form);
    }

    function renderSelectObjectsDecision(decision, canAct) {
      if (decision.max === 1) {
        decision.candidates.forEach((candidate) => {
          el.decisionBody.appendChild(
            createActionButton(candidate.name, !canAct || !candidate.legal, () => {
              sendCommand({ type: "select_objects", object_ids: [candidate.id] }, `Selected: ${candidate.name}`);
            })
          );
        });
        if (decision.min === 0) {
          el.decisionBody.appendChild(
            createActionButton("Skip", !canAct, () => {
              sendCommand({ type: "select_objects", object_ids: [] }, "Selection skipped");
            })
          );
        }
        return;
      }

      const form = document.createElement("form");
      form.className = "choice-form";
      const scroll = document.createElement("div");
      scroll.className = "choice-scroll";
      decision.candidates.forEach((candidate) => {
        const row = document.createElement("label");
        row.className = "choice-option";
        row.innerHTML = `
          <input type="checkbox" name="object" value="${candidate.id}" ${!candidate.legal || !canAct ? "disabled" : ""}>
          <span>${escapeHtml(candidate.name)}</span>
        `;
        scroll.appendChild(row);
      });
      form.appendChild(scroll);

      const submit = document.createElement("button");
      submit.type = "submit";
      submit.textContent = "Submit Objects";
      submit.disabled = !canAct;
      form.appendChild(submit);

      form.addEventListener("submit", (ev) => {
        ev.preventDefault();
        const selected = Array.from(form.querySelectorAll("input[name='object']:checked"))
          .map((node) => Number(node.value));
        sendCommand({ type: "select_objects", object_ids: selected }, "Objects submitted");
      });

      el.decisionBody.appendChild(form);
    }

    function renderNumberDecision(decision, canAct) {
      const form = document.createElement("form");
      form.className = "choice-form";
      form.innerHTML = `
        <label class="choice-option">
          <span>${escapeHtml(decision.description)}</span>
        </label>
        <input type="number" id="numberChoice" min="${decision.min}" max="${decision.max}" value="${decision.min}" ${!canAct ? "disabled" : ""}>
        <button type="submit" ${!canAct ? "disabled" : ""}>Submit Number</button>
      `;

      form.addEventListener("submit", (ev) => {
        ev.preventDefault();
        const value = Number(form.querySelector("#numberChoice").value);
        sendCommand({ type: "number_choice", value }, `Number selected: ${value}`);
      });

      el.decisionBody.appendChild(form);
    }

    function decodeTargetChoice(choice) {
      if (choice.kind === "player") {
        return { kind: "player", player: Number(choice.player) };
      }
      return { kind: "object", object: Number(choice.object) };
    }

    function decodeAttackTargetChoice(choice) {
      if (choice.kind === "player") {
        return { kind: "player", player: Number(choice.player) };
      }
      return { kind: "planeswalker", object: Number(choice.object) };
    }

    function attackTargetMatchesChoice(target, choice) {
      if (!target || !choice) {
        return false;
      }
      if (target.kind === "player" && choice.kind === "player") {
        return Number(target.player) === Number(choice.player);
      }
      if (target.kind === "planeswalker" && choice.kind === "planeswalker") {
        return Number(target.object) === Number(choice.object);
      }
      return false;
    }

    function attackTargetLabelFromOption(option, choice) {
      const matched = (option.valid_targets || []).find((target) => attackTargetMatchesChoice(target, choice));
      if (matched) {
        return matched.name;
      }
      if (choice.kind === "player") {
        return playerName(Number(choice.player));
      }
      return `Object ${Number(choice.object)}`;
    }

    function renderTargetsDecision(decision, canAct) {
      const form = document.createElement("form");
      form.className = "choice-form";

      decision.requirements.forEach((req, idx) => {
        const wrap = document.createElement("div");
        wrap.className = "choice-option";

        const label = document.createElement("span");
        label.textContent = req.description;
        wrap.appendChild(label);

        const maxTargets = req.max_targets === null || req.max_targets === undefined
          ? null
          : Number(req.max_targets);
        const singleTargetOnly = maxTargets === 1;

        if (singleTargetOnly) {
          const select = document.createElement("select");
          select.name = `target_${idx}`;
          if (!canAct) {
            select.disabled = true;
          }

          if (req.min_targets === 0) {
            const blank = document.createElement("option");
            blank.value = "";
            blank.textContent = "(No target)";
            select.appendChild(blank);
          }

          req.legal_targets.forEach((target) => {
            const option = document.createElement("option");
            option.value = JSON.stringify(decodeTargetChoice(target));
            option.textContent = target.kind === "player"
              ? `Player: ${target.name}`
              : `Object: ${target.name}`;
            select.appendChild(option);
          });
          wrap.appendChild(select);
        } else {
          const range = document.createElement("span");
          range.className = "subtle";
          const maxLabel = maxTargets === null ? "any number" : String(maxTargets);
          range.textContent = `Choose ${req.min_targets} to ${maxLabel} target(s)`;
          wrap.appendChild(range);

          const multi = document.createElement("div");
          multi.className = "choice-form";

          if (!req.legal_targets || req.legal_targets.length === 0) {
            const note = document.createElement("div");
            note.className = "choice-option";
            note.textContent = "No legal targets available.";
            multi.appendChild(note);
          }

          req.legal_targets.forEach((target) => {
            const row = document.createElement("label");
            row.className = "choice-option";

            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.name = `target_${idx}`;
            checkbox.value = JSON.stringify(decodeTargetChoice(target));
            checkbox.disabled = !canAct;

            const optionLabel = document.createElement("span");
            optionLabel.textContent = target.kind === "player"
              ? `Player: ${target.name}`
              : `Object: ${target.name}`;

            row.appendChild(checkbox);
            row.appendChild(optionLabel);
            multi.appendChild(row);
          });

          wrap.appendChild(multi);
        }

        form.appendChild(wrap);
      });

      const submit = document.createElement("button");
      submit.type = "submit";
      submit.textContent = "Submit Targets";
      submit.disabled = !canAct;
      form.appendChild(submit);

      form.addEventListener("submit", (ev) => {
        ev.preventDefault();
        const selected = [];
        let validationError = null;

        decision.requirements.forEach((req, idx) => {
          const maxTargets = req.max_targets === null || req.max_targets === undefined
            ? null
            : Number(req.max_targets);
          const singleTargetOnly = maxTargets === 1;

          if (singleTargetOnly) {
            const select = form.querySelector(`select[name='target_${idx}']`);
            if (!select) {
              return;
            }
            if (select.value) {
              selected.push(JSON.parse(select.value));
            }
            const chosen = select.value ? 1 : 0;
            if (chosen < req.min_targets) {
              validationError = `Select at least ${req.min_targets} target(s) for "${req.description}"`;
            }
            return;
          }

          const checked = Array.from(form.querySelectorAll(`input[name='target_${idx}']:checked`));
          if (checked.length < req.min_targets) {
            validationError = `Select at least ${req.min_targets} target(s) for "${req.description}"`;
            return;
          }
          if (maxTargets !== null && checked.length > maxTargets) {
            validationError = `Select at most ${maxTargets} target(s) for "${req.description}"`;
            return;
          }
          checked.forEach((node) => {
            selected.push(JSON.parse(node.value));
          });
        });

        if (validationError) {
          setStatus(validationError, true);
          return;
        }

        if (!canAct) {
          return;
        }

        sendCommand({ type: "select_targets", targets: selected }, "Targets selected");
      });

      el.decisionBody.appendChild(form);
    }

    function renderAttackersDecision(decision, canAct) {
      const form = document.createElement("form");
      form.className = "choice-form";

      if (!decision.attacker_options || decision.attacker_options.length === 0) {
        const note = document.createElement("div");
        note.className = "choice-option";
        note.textContent = "No legal attackers.";
        form.appendChild(note);
      }

      decision.attacker_options.forEach((option, idx) => {
        const row = document.createElement("div");
        row.className = "choice-option";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.name = `atk_enabled_${idx}`;
        checkbox.checked = !!option.must_attack;
        checkbox.disabled = !canAct || !!option.must_attack;

        const label = document.createElement("span");
        label.textContent = option.must_attack
          ? `${option.creature_name} (must attack)`
          : option.creature_name;

        const select = document.createElement("select");
        select.name = `atk_target_${idx}`;
        select.disabled = !canAct || !checkbox.checked;
        (option.valid_targets || []).forEach((target) => {
          const opt = document.createElement("option");
          opt.value = JSON.stringify(decodeAttackTargetChoice(target));
          opt.textContent = target.kind === "player"
            ? `Player: ${target.name}`
            : `Planeswalker: ${target.name}`;
          select.appendChild(opt);
        });

        checkbox.addEventListener("change", () => {
          select.disabled = !canAct || !checkbox.checked;
        });

        row.appendChild(checkbox);
        row.appendChild(label);
        row.appendChild(select);
        form.appendChild(row);
      });

      const submit = document.createElement("button");
      submit.type = "submit";
      submit.textContent = "Declare Attackers";
      submit.disabled = !canAct;
      form.appendChild(submit);

      form.addEventListener("submit", (ev) => {
        ev.preventDefault();
        const declarations = [];

        (decision.attacker_options || []).forEach((option, idx) => {
          const checkbox = form.querySelector(`[name='atk_enabled_${idx}']`);
          const select = form.querySelector(`[name='atk_target_${idx}']`);
          const selected = checkbox ? checkbox.checked : false;
          if (!selected) {
            return;
          }
          if (!select || !select.value) {
            return;
          }
          declarations.push({
            creature: Number(option.creature),
            target: JSON.parse(select.value)
          });
        });

        sendCommand({ type: "declare_attackers", declarations }, "Declared attackers");
      });

      el.decisionBody.appendChild(form);
    }

    function renderBlockersDecision(decision, canAct) {
      const form = document.createElement("form");
      form.className = "choice-form";

      if (!decision.blocker_options || decision.blocker_options.length === 0) {
        const note = document.createElement("div");
        note.className = "choice-option";
        note.textContent = "No legal blocks.";
        form.appendChild(note);
      }

      decision.blocker_options.forEach((option, idx) => {
        const section = document.createElement("div");
        section.className = "choice-option";

        const title = document.createElement("span");
        title.textContent = option.min_blockers > 0
          ? `${option.attacker_name} (min blockers: ${option.min_blockers})`
          : option.attacker_name;
        section.appendChild(title);

        (option.valid_blockers || []).forEach((blocker) => {
          const row = document.createElement("label");
          row.className = "choice-option";
          row.innerHTML = `
            <input type="checkbox" name="block_${idx}" value="${blocker.id}" ${!canAct ? "disabled" : ""}>
            <span>${escapeHtml(blocker.name)}</span>
          `;
          section.appendChild(row);
        });

        form.appendChild(section);
      });

      const submit = document.createElement("button");
      submit.type = "submit";
      submit.textContent = "Declare Blockers";
      submit.disabled = !canAct;
      form.appendChild(submit);

      form.addEventListener("submit", (ev) => {
        ev.preventDefault();
        const declarations = [];

        (decision.blocker_options || []).forEach((option, idx) => {
          const selected = Array.from(form.querySelectorAll(`input[name='block_${idx}']:checked`));
          selected.forEach((node) => {
            declarations.push({
              blocker: Number(node.value),
              blocking: Number(option.attacker)
            });
          });
        });

        sendCommand({ type: "declare_blockers", declarations }, "Declared blockers");
      });

      el.decisionBody.appendChild(form);
    }

    function renderDecision() {
      const decision = state.decision;
      if (!decision) {
        hideActionPopover();
        clearInteractionDrafts();
        if (state.game_over) {
          if (state.game_over.kind === "winner") {
            clearDecisionPanel(`Game Over • ${state.game_over.name} wins`);
          } else if (state.game_over.kind === "draw") {
            clearDecisionPanel("Game Over • Draw");
          } else {
            clearDecisionPanel("Game Over");
          }
        } else {
          clearDecisionPanel("No pending decision");
        }
        return;
      }

      const actorName = playerName(decision.player);
      const canAct = decision.player === state.perspective;
      const roleHint = canAct ? "Your turn" : `Waiting on ${actorName}`;
      el.decisionMeta.textContent = `${roleHint} • ${decision.kind}`;
      el.decisionBody.innerHTML = "";

      // Show description banner for non-priority decisions
      if (decision.kind !== "priority") {
        const desc = decision.description || decision.context;
        const src = decision.source_name;
        const rsn = decision.reason;
        if (desc || src || rsn) {
          const banner = document.createElement("div");
          banner.className = "decision-banner";
          let html = "";
          if (rsn) html += `<span class="decision-reason-tag">${escapeHtml(rsn)}</span>`;
          if (src) html += `<strong>${escapeHtml(src)}</strong>`;
          if (desc) html += (html ? " — " : "") + escapeHtml(desc);
          banner.innerHTML = html;
          el.decisionBody.appendChild(banner);
        }
      }

      if (decision.kind === "priority") {
        const grouped = priorityActionsByObject(decision);
        const visibleObjectIds = visibleObjectIdsInUi();
        const actionableCount = Array.from(grouped.keys()).filter((id) => visibleObjectIds.has(Number(id))).length;
        const supplementalActions = (decision.actions || []).filter((a) => {
          if (a.kind === "pass_priority") {
            return false;
          }
          if (a.object_id === null || a.object_id === undefined) {
            return true;
          }
          const objectId = Number(a.object_id);
          return !Number.isFinite(objectId) || !visibleObjectIds.has(objectId);
        });
        const hint = document.createElement("div");
        hint.className = "choice-form";
        hint.innerHTML = `
          <div class="choice-option"><span>${canAct ? `${actionableCount} actionable card${actionableCount === 1 ? "" : "s"}` : "Waiting for opponent"}</span></div>
        `;
        if (canAct) {
          const passAction = (decision.actions || []).find((a) => a.kind === "pass_priority");
          if (passAction) {
            hint.appendChild(createActionButton("Pass priority", false, () => {
              sendCommand({ type: "priority_action", action_index: passAction.index }, "Pass priority");
            }));
          }
          if (supplementalActions.length) {
            const otherHint = document.createElement("div");
            otherHint.className = "choice-option";
            otherHint.innerHTML = "<span>Additional available actions:</span>";
            hint.appendChild(otherHint);
            for (const action of supplementalActions) {
              hint.appendChild(createActionButton(action.label, false, () => {
                sendCommand({ type: "priority_action", action_index: action.index }, action.label);
              }));
            }
          }
        }
        el.decisionBody.appendChild(hint);
        return;
      }
      if (decision.kind === "select_options") {
        renderSelectOptionsDecision(decision, canAct);
        return;
      }
      if (decision.kind === "select_objects") {
        renderSelectObjectsDecision(decision, canAct);
        return;
      }
      if (decision.kind === "number") {
        renderNumberDecision(decision, canAct);
        return;
      }
      if (decision.kind === "targets") {
        if (canAct && interactiveTargetingSupported(decision)) {
          const draft = ensureTargetingDraft(decision);
          const req = (decision.requirements || [])[draft.index];
          const total = (decision.requirements || []).length;
          const form = document.createElement("div");
          form.className = "choice-form";
          const prompt = req ? req.description : "Select target";
          form.innerHTML = `
            <div class="choice-option"><span>Target ${Math.min(draft.index + 1, total)} / ${total}: ${escapeHtml(prompt)}</span></div>
            <div class="choice-option"><span>Legal targets are highlighted in yellow.</span></div>
          `;
          if (req && req.min_targets === 0) {
            const skip = createActionButton("Skip target", !canAct, () => {
              draft.index += 1;
              if (draft.index >= total) {
                const selected = draft.selections.slice();
                targetingDraft = null;
                sendCommand({ type: "select_targets", targets: selected }, "Targets selected");
                return;
              }
              render();
            });
            form.appendChild(skip);
          }
          el.decisionBody.appendChild(form);
          return;
        }
        renderTargetsDecision(decision, canAct);
        return;
      }
      if (decision.kind === "attackers") {
        if (canAct) {
          const draft = ensureAttackersDraft(decision);
          const form = document.createElement("div");
          form.className = "choice-form";
          form.innerHTML = `<div class="choice-option"><span>Select a purple attacker, then click a red legal target. Selected targets glow orange.</span></div>`;

          const summaryRows = [];
          for (const opt of decision.attacker_options || []) {
            const assigned = draft.assignments.get(Number(opt.creature));
            if (assigned) {
              const targetLabel = attackTargetLabelFromOption(opt, assigned);
              summaryRows.push(`<div>${escapeHtml(opt.creature_name)} -> ${escapeHtml(targetLabel)}</div>`);
            } else if (opt.must_attack) {
              summaryRows.push(`<div>${escapeHtml(opt.creature_name)} -> (must choose target)</div>`);
            }
          }
          const summary = document.createElement("div");
          summary.className = "choice-option";
          summary.innerHTML = summaryRows.length
            ? `<span>Current declarations:</span>${summaryRows.join("")}`
            : `<span>Current declarations: none</span>`;
          form.appendChild(summary);

          form.appendChild(createActionButton("Declare attackers", false, () => {
            const declarations = [];
            for (const opt of decision.attacker_options || []) {
              const target = draft.assignments.get(Number(opt.creature));
              if (!target) {
                if (opt.must_attack) {
                  const fallback = (opt.valid_targets || [])[0];
                  if (!fallback) {
                    setStatus(`${opt.creature_name} must attack but has no legal target`, true);
                    return;
                  }
                  declarations.push({ creature: Number(opt.creature), target: decodeAttackTargetChoice(fallback) });
                  continue;
                }
                continue;
              }
              declarations.push({ creature: Number(opt.creature), target });
            }
            const suffix = declarations.length > 0
              ? `Declared ${declarations.length} attacker(s)`
              : "Declared no attackers";
            sendCommand({ type: "declare_attackers", declarations }, suffix);
          }));
          form.appendChild(createActionButton("Clear optional attackers", false, () => {
            for (const opt of decision.attacker_options || []) {
              if (!opt.must_attack) {
                draft.assignments.delete(Number(opt.creature));
              }
            }
            draft.activeCreature = Number((decision.attacker_options || [])[0]?.creature ?? NaN);
            render();
          }));
          el.decisionBody.appendChild(form);
          return;
        }
        renderAttackersDecision(decision, canAct);
        return;
      }
      if (decision.kind === "blockers") {
        if (canAct) {
          const draft = ensureBlockersDraft(decision);
          const form = document.createElement("div");
          form.className = "choice-form";
          form.innerHTML = `<div class="choice-option"><span>Select a highlighted attacker, then choose your purple blockers.</span></div>`;
          form.appendChild(createActionButton("Declare blockers", false, () => {
            const declarations = Array.from(draft.assignments.entries()).map(([blocker, blocking]) => ({
              blocker: Number(blocker),
              blocking: Number(blocking)
            }));
            sendCommand({ type: "declare_blockers", declarations }, "Declared blockers");
          }));
          form.appendChild(createActionButton("Clear blockers", false, () => {
            draft.assignments.clear();
            render();
          }));
          el.decisionBody.appendChild(form);
          return;
        }
        renderBlockersDecision(decision, canAct);
        return;
      }

      clearDecisionPanel(`Unsupported decision kind: ${decision.kind}`);
    }

    function render() {
      clearSelectedPlay();
      if (!state || !state.players || !state.players.length) {
        return;
      }

      const me = perspectivePlayer();
      const orderedPlayers = playersInPerspectiveOrder(me);
      const opponents = orderedPlayers.filter((p) => p.id !== me.id);
      const nextSeatPlayer = opponents[0] || me;
      const dragInfo = getDragInfo();

      renderPlayersPane(me, orderedPlayers);
      renderTurnPane(me, nextSeatPlayer);
      // Populate add-card player dropdown
      const curAddPlayer = el.addCardPlayer.value;
      el.addCardPlayer.innerHTML = state.players
        .map((p) => `<option value="${p.id}"${p.id === me.id ? " selected" : ""}>${escapeHtml(p.name)}</option>`)
        .join("");
      if (curAddPlayer && state.players.some((p) => String(p.id) === curAddPlayer)) {
        el.addCardPlayer.value = curAddPlayer;
      }

      el.oppZoneContent.innerHTML = opponentZoneMarkup(opponents, zoneView);
      el.myZoneContent.innerHTML = myZoneMarkup(me, zoneView, dragInfo);
      el.myZoneContent.classList.toggle("battlefield-row", zoneView === "battlefield");
      el.myZone.classList.toggle("drop-zone", zoneView === "battlefield");
      if (zoneView === "battlefield") {
        el.myZone.setAttribute("data-drop-zone", "battlefield");
      } else {
        el.myZone.removeAttribute("data-drop-zone");
      }
      el.handStrip.innerHTML = handCards(me, dragInfo, true);
      renderStack();
      renderPhaseTrack();
      renderDecision();
      wireDragAndDrop();
      wireObjectInspector();
      wireDecisionInteractions();
      wireScryfallLinks();
      fitBattlefieldRows();
      updateChangePlayerDropdown();

      el.pillPerspective.textContent = `View ${me.name}`;
      el.pillTurn.textContent = `Turn ${state.turn_number}`;
      el.pillPhase.textContent = `Phase ${state.phase}`;
      el.pillStep.textContent = `Step ${formatStep(state.step)}`;
      updateRegistryPill();
    }

    async function refresh(message) {
      state = await game.uiState();
      const autoResult = await settleOpponentPriority();
      const autoResolved = await autoResolveTrivialDecisions();
      render();
      const autoStatus = buildAutoPassStatus(autoResult);
      const parts = [message, autoStatus, autoResolved ? `${autoResolved} auto-resolved` : null].filter(Boolean);
      if (parts.length) {
        setStatus(parts.join(" • "));
      }
    }

    async function addCard() {
      const name = String(el.addCardName.value || "").trim();
      if (!name) {
        setStatus("Enter a card name to add", true);
        return;
      }
      if (!game || typeof game.addCardToZone !== "function") {
        setStatus("This WASM build does not expose addCardToZone", true);
        return;
      }
      const pid = Number(el.addCardPlayer.value);
      const zone = el.addCardZone.value;
      const skipTriggers = el.addCardSkipTriggers.checked;
      try {
        const objectId = Number(game.addCardToZone(pid, name, zone, skipTriggers));
        el.addCardName.value = "";
        await refresh(`Added ${name} to ${playerName(pid)}'s ${zone}`);
        if (Number.isFinite(objectId)) {
          await inspectObject(objectId);
        }
      } catch (err) {
        setStatus(`Add card failed: ${err}`, true);
      }
    }

    async function setupDemoBoard() {
      try {
        const playerIndex = Number(state.active_player);

        // Pass priority twice to advance to main phase
        for (let i = 0; i < 2; i++) {
          if (!state || !state.decision) break;
          const passAction = (state.decision.actions || []).find((a) => a.kind === "pass_priority");
          if (!passAction) break;
          state = await game.dispatch({ type: "priority_action", action_index: passAction.index });
          const autoResult = await settleOpponentPriority();
        }

        // Add 3 Black Lotuses and cast each one
        for (let i = 0; i < 3; i++) {
          const objectId = Number(game.addCardToZone(playerIndex, "Black Lotus", "hand", true));
          state = await game.uiState();

          // Find the cast action for this Black Lotus
          if (state.decision && state.decision.actions) {
            const castAction = state.decision.actions.find(
              (a) => a.kind === "cast_spell" && Number(a.object_id) === objectId
            );
            if (castAction) {
              state = await game.dispatch({ type: "priority_action", action_index: castAction.index });
              await settleOpponentPriority();

              // Pass priority to resolve it off the stack
              if (state && state.decision) {
                const passAction = (state.decision.actions || []).find((a) => a.kind === "pass_priority");
                if (passAction) {
                  state = await game.dispatch({ type: "priority_action", action_index: passAction.index });
                  await settleOpponentPriority();
                }
              }
            }
          }
        }

        render();
        setStatus("Demo: 3 Black Lotuses on battlefield, main phase");
      } catch (err) {
        console.error("setupDemoBoard failed:", err);
        setStatus(`Demo setup failed: ${err}`, true);
      }
    }

    async function main() {
      const loaded = await loadWasmModule();
      const wasmInitBust = `v=${Date.now()}-${Math.floor(Math.random() * 1e9)}`;
      await loaded.mod.default(`${loaded.wasmPath}?${wasmInitBust}`);
      const WasmGame = loaded.mod.WasmGame;
      game = new WasmGame();
      const registrySize = typeof game.registrySize === "function"
        ? Number(game.registrySize())
        : NaN;
      const loadedDefaultMessage = Number.isFinite(registrySize)
        ? `WASM loaded • ${registrySize} cards • 4-player default`
        : "WASM loaded • 4-player default";
      const loadedMessage = Number.isFinite(registrySize)
        ? `WASM loaded • ${registrySize} cards`
        : "WASM loaded";

      try {
        game.reset(parseNames(el.names.value), Number(el.life.value || 20));
        await refresh(loadedDefaultMessage);
        await setupDemoBoard();
      } catch (err) {
        await refresh(loadedMessage);
        setStatus(`Default 4-player reset failed: ${err}`, true);
      }

      el.names.addEventListener("input", () => autoSizeInput(el.names));
      autoSizeInput(el.names);

      document.getElementById("resetBtn").addEventListener("click", async () => {
        try {
          game.reset(parseNames(el.names.value), Number(el.life.value || 20));
          await refresh("Game reset");
        } catch (err) {
          setStatus(`Reset failed: ${err}`, true);
        }
      });

      document.getElementById("loadDemoDecks").addEventListener("click", async () => {
        try {
          game.loadDemoDecks();
          await refresh("Demo decks loaded");
        } catch (err) {
          setStatus(`Load decks failed: ${err}`, true);
        }
      });

      document.getElementById("drawOpeners").addEventListener("click", async () => {
        try {
          game.drawOpeningHands(7);
          await refresh("Each player drew 7 cards");
        } catch (err) {
          setStatus(`Draw failed: ${err}`, true);
        }
      });

      el.addCardBtn.addEventListener("click", () => addCard());
      el.addCardName.addEventListener("keydown", (ev) => {
        if (ev.key === "Enter") { ev.preventDefault(); addCard(); }
      });

      document.getElementById("advancePhase").addEventListener("click", async () => {
        try {
          game.advancePhase();
          await refresh("Advanced phase");
        } catch (err) {
          setStatus(`advancePhase failed: ${err}`, true);
        }
      });

      el.changePlayer.addEventListener("change", async () => {
        try {
          const playerIndex = Number(el.changePlayer.value);
          game.setPerspective(playerIndex);
          await refresh(`Viewing as ${playerName(playerIndex)}`);
        } catch (err) {
          setStatus(`Change player failed: ${err}`, true);
        }
      });

      document.getElementById("refreshBtn").addEventListener("click", async () => {
        await refresh("Refreshed");
      });

      el.autoPassOpponent.addEventListener("change", async () => {
        game.setAutoCleanupDiscard(el.autoPassOpponent.checked);
        await refresh("Updated opponent auto-pass");
      });

      el.opponentHoldRule.addEventListener("change", async () => {
        await refresh("Updated opponent hold rule");
      });

      document.querySelectorAll('input[name="zoneView"]').forEach((radio) => {
        radio.addEventListener("change", () => {
          zoneView = radio.value;
          render();
        });
      });

      el.inspectorRailToggle.addEventListener("click", () => {
        inspectorPanelOpen = !inspectorPanelOpen;
        updateRightRailState();
      });

      el.logToggle.addEventListener("click", () => {
        const isOpen = el.logDrawer.classList.contains("open");
        setLogDrawerOpen(!isOpen);
      });

      updateLeftRailState();
      updateRightRailState();
      setLogDrawerOpen(false);
      window.addEventListener("resize", () => render());
    }

    main().catch((err) => {
      setStatus(`Initialization failed: ${err}`, true);
      console.error(err);
    });
  </script>
</body>
</html>
