<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maishik Table</title>
  <style>
    :root {
      --bg: #070b10;
      --bg-soft: #121820;
      --panel: #0f151d;
      --panel-2: #171f2b;
      --line: #33465c;
      --line-2: #1d2a39;
      --text: #e7edf8;
      --muted: #95a9c4;
      --good: #58d6a6;
      --warn: #f7b869;
      --accent: #64a9ff;
      --danger: #ff6f8e;
      --shadow: 0 16px 38px rgba(0, 0, 0, 0.46);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      background:
        radial-gradient(1200px 640px at 38% -8%, #252f3e 0%, transparent 52%),
        radial-gradient(1000px 700px at 80% 120%, #151e2d 0%, transparent 58%),
        linear-gradient(180deg, #070b10 0%, #0a0f15 100%);
      color: var(--text);
      font-family: "Rajdhani", "Segoe UI", "Inter", sans-serif;
      letter-spacing: 0.15px;
    }

    .shell {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 8px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 8px;
      height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(180deg, #0e151f, #0b1017);
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 4px 10px;
      box-shadow: var(--shadow);
      flex-wrap: wrap;
    }

    .topbar input, .topbar button, .topbar select {
      padding: 3px 6px;
      font-size: 11px;
      min-height: 24px;
    }

    .topbar .sep {
      width: 1px;
      height: 18px;
      background: var(--line);
      flex: 0 0 auto;
    }

    .topbar .spacer {
      flex: 1 0 0;
    }

    #playerNames {
      width: auto;
      min-width: 60px;
    }

    .topbar-log-btn {
      white-space: nowrap;
    }

    .brand {
      margin: 0;
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      white-space: nowrap;
    }

    .subtle {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .pill {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #1a2431, #121922);
      border-radius: 2px;
      padding: 2px 6px;
      font-size: 10px;
      text-transform: uppercase;
      color: #d7e5fb;
      text-align: center;
      white-space: nowrap;
    }

    .workspace {
      --left-w: 15vw;
      --right-w: 286px;
      display: grid;
      grid-template-columns: var(--left-w) minmax(0, 1fr) var(--right-w);
      gap: 8px;
      min-height: 0;
      height: 100%;
    }

    .workspace.right-expanded {
      --right-w: clamp(330px, 23vw, 390px);
    }

    .left-rail,
    .right-rail,
    .table-core {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #0d131b, #090f16);
      box-shadow: var(--shadow);
      min-height: 0;
    }

    .left-rail {
      position: relative;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }

    .left-rail .players-pane {
      flex: 0 0 auto;
    }

    .left-rail .decision-panel {
      flex: 1 1 0;
    }

    .left-rail .turn-pane {
      flex: 0 0 auto;
    }

    .left-rail.collapsed {
      padding: 8px 6px;
    }

    .left-rail.collapsed .turn-pane {
      display: none;
    }

    .decision-panel {
      min-height: 0;
      overflow: hidden;
    }

    .decision-header {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex: 0 0 auto;
    }

    .decision-header h3 {
      margin: 0;
      white-space: nowrap;
    }

    .decision-panel .action-list {
      flex: 1 1 0;
      overflow: auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .decision-panel .action-list > .choice-form {
      flex: 1 1 0;
      min-height: 0;
    }

    .players-pane {
      display: grid;
      gap: 8px;
      align-content: start;
      overflow: auto;
      min-height: 0;
    }

    .side-player {
      border: 1px solid var(--line-2);
      background: linear-gradient(180deg, #151e2a, #101723);
      padding: 8px;
      display: grid;
      gap: 8px;
    }

    .left-rail.collapsed .side-player {
      padding: 6px;
      gap: 5px;
    }

    .side-player.active {
      border-color: rgba(88, 214, 166, 0.76);
      box-shadow: 0 0 0 1px rgba(88, 214, 166, 0.32) inset;
    }

    .side-player.perspective {
      border-color: rgba(100, 169, 255, 0.88);
      box-shadow: 0 0 0 1px rgba(100, 169, 255, 0.35) inset;
    }

    .side-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .side-head-main {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .side-head-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .side-name {
      font-size: 19px;
      font-weight: 700;
      margin: 0;
    }

    .left-rail.collapsed .side-name {
      font-size: 16px;
    }

    .life-chip {
      border: 1px solid var(--line);
      background: #0b1118;
      min-width: 48px;
      padding: 3px 9px;
      text-align: center;
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
    }

    .left-rail.collapsed .life-chip {
      min-width: 42px;
      font-size: 20px;
      padding: 2px 7px;
    }

    .side-expand-btn {
      width: 20px;
      height: 20px;
      min-height: 20px;
      padding: 0;
      border: 1px solid #36506e;
      background: #101a26;
      color: #cbe2ff;
      font-size: 11px;
      line-height: 1;
      cursor: pointer;
    }

    .side-expand-btn.open {
      border-color: #5a83af;
      background: #17273a;
    }

    .side-player-expanded {
      gap: 6px;
    }

    .mana-pool {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px;
    }

    .mana-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      border: 1px solid #2a3e56;
      background: #0b121b;
      border-radius: 999px;
      padding: 1px 4px;
    }

    .mana-symbol {
      width: 14px;
      height: 14px;
      display: block;
      flex: 0 0 auto;
    }

    .mana-count {
      min-width: 7px;
      text-align: center;
      font-size: 11px;
      line-height: 1;
      font-weight: 700;
      color: #d6e6fb;
    }

    .side-head-main .mana-pool {
      margin-left: 2px;
      flex-wrap: nowrap;
    }

    .left-rail.collapsed .mana-pool {
      gap: 3px;
    }

    .left-rail.collapsed .mana-chip {
      gap: 2px;
      padding: 1px 3px;
    }

    .left-rail.collapsed .mana-symbol {
      width: 11px;
      height: 11px;
    }

    .left-rail.collapsed .mana-count {
      font-size: 10px;
    }

    .zone-mini {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      font-size: 11px;
      color: #a8bfdd;
      letter-spacing: 0.2px;
    }

    .zone-mini span {
      border: 1px solid #223448;
      background: #0b121b;
      padding: 1px 4px;
      border-radius: 2px;
      min-width: 30px;
      text-align: center;
    }

    .side-expanded-zones {
      display: grid;
      gap: 6px;
    }

    .side-zone-block {
      border: 1px solid #24374b;
      background: #0a111a;
      padding: 4px;
      display: grid;
      gap: 4px;
    }

    .side-zone-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      color: #a4bdd7;
      text-transform: uppercase;
      letter-spacing: 0.45px;
      font-size: 10px;
      font-weight: 700;
    }

    .side-zone-list {
      display: grid;
      grid-auto-rows: min-content;
      gap: 4px;
      max-height: 132px;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 2px;
      align-content: start;
    }

    .side-zone-entry {
      border: 1px solid #2b4058;
      background: linear-gradient(180deg, #172334, #0f1826);
      color: #dbe9ff;
      font-size: 11px;
      line-height: 1.25;
      padding: 4px 5px;
      cursor: pointer;
      user-select: none;
    }

    .side-zone-entry:hover {
      border-color: #6f95bf;
      background: #1a2a3e;
    }

    .side-zone-entry.empty {
      color: #8ea5c0;
      border-color: #223244;
      background: #0d141f;
      cursor: default;
    }

    .zone-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      font-size: 12px;
    }

    .zone-cell {
      border: 1px solid #1f2c3d;
      background: #0b121b;
      padding: 4px;
      display: grid;
      gap: 2px;
      min-height: 42px;
    }

    .zone-cell strong {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .turn-pane {
      border: 1px solid var(--line-2);
      background: #0b121a;
      padding: 8px;
      display: grid;
      gap: 6px;
      align-content: start;
      min-height: 0;
    }

    .turn-pane h4 {
      margin: 0;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.65px;
      color: var(--muted);
    }

    .right-stack-panel {
      min-height: 0;
      grid-template-rows: auto minmax(0, 1fr);
      align-content: stretch;
      overflow: hidden;
    }

    .right-stack-panel .stack-items {
      overflow-y: auto;
      overflow-x: hidden;
      min-height: 0;
      display: grid;
      grid-auto-rows: min-content;
      gap: 6px;
      padding-right: 2px;
      align-content: start;
    }

    .right-stack-panel .stack-card {
      width: 100%;
      min-width: 0;
      min-height: 80px;
    }

    .turn-summary {
      border: 1px solid #203247;
      background: #0a1118;
      padding: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 12px;
      color: #d3e5fb;
    }

    .turn-summary span {
      border: 1px solid #1e3044;
      background: #0c151f;
      padding: 1px 6px;
      border-radius: 2px;
    }

    .table-core {
      display: grid;
      grid-template-rows: 1.7fr 1fr auto auto;
      gap: 6px;
      padding: 6px;
      min-height: 0;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(1100px 300px at 50% 35%, rgba(86, 100, 116, 0.24), transparent 72%),
        linear-gradient(180deg, #2f3843 0%, #232c39 46%, #1a232f 100%);
    }

    .board-zone {
      border: 1px solid #3a4e64;
      background: linear-gradient(180deg, rgba(18, 28, 40, 0.88), rgba(14, 20, 30, 0.72));
      padding: 8px;
      min-height: 120px;
      display: grid;
      gap: 7px;
      align-content: start;
    }

    .board-zone h3 {
      margin: 0;
      color: #a4bdd7;
      text-transform: uppercase;
      letter-spacing: 0.55px;
      font-size: 12px;
      font-weight: 600;
    }

    .add-card-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(180deg, #0e151f, #0b1017);
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 4px 10px;
      box-shadow: var(--shadow);
    }

    .add-card-bar .spacer {
      flex: 1 0 0;
    }

    .view-icon {
      color: var(--muted);
      flex-shrink: 0;
    }

    .zone-radio-group {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .zone-radio-group label {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      cursor: pointer;
      padding: 3px 7px;
      border: 1px solid transparent;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      transition: background 100ms ease, border-color 100ms ease;
    }

    .zone-radio-group label:has(input:checked) {
      color: #e2edff;
      background: rgba(62, 98, 138, 0.35);
      border-color: #3e628a;
    }

    .zone-radio-group input[type="radio"] {
      display: none;
    }

    .zone-add-btn {
      padding: 2px 8px;
      font-size: 12px;
    }

    .zone-add-input {
      font-size: 12px;
      padding: 2px 4px;
    }
    .zone-select {
      padding: 2px 6px;
      font-size: 11px;
      min-height: 22px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      background: #0b1118;
      border: 1px solid #344a61;
      color: #e2edff;
      border-radius: 2px;
      cursor: pointer;
    }
    .zone-empty-message {
      color: var(--muted);
      font-size: 13px;
      padding: 12px;
      text-align: center;
      font-style: italic;
    }

    .opponent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      grid-auto-rows: minmax(0, 1fr);
      gap: 8px;
      min-height: 0;
      height: 100%;
      align-content: stretch;
    }

    .opponent-slot {
      border: 1px solid #2b3e55;
      background: linear-gradient(180deg, #101826, #0a121d);
      padding: 7px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 6px;
      min-height: 0;
      height: 100%;
      align-content: stretch;
    }

    .opponent-slot-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }

    .opponent-slot-name {
      font-size: 12px;
      color: #a4bdd7;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
    }

    .opponent-slot .battlefield-row {
      min-height: 0;
      height: 100%;
      align-items: flex-start;
    }

    .battlefield-row {
      --bf-gap: 6px;
      --bf-card-width: 124px;
      --bf-card-height: 96px;
      display: grid;
      gap: var(--bf-gap);
      grid-template-columns: repeat(var(--bf-cols, 1), minmax(0, var(--bf-card-width)));
      grid-auto-rows: var(--bf-card-height);
      align-content: start;
      justify-content: start;
      min-height: 0;
      height: 100%;
      overflow: visible;
    }

    .battlefield-row .card.object-card {
      width: var(--bf-card-width);
      min-width: var(--bf-card-width);
      min-height: var(--bf-card-height);
      height: var(--bf-card-height);
    }

    .battlefield-row .card.object-card .card-label,
    .hand-card .card-label {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      margin-top: 0;
      background: rgba(16, 24, 35, 0.85);
      padding: 3px 5px;
      z-index: 2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }


    .battlefield-row .card.object-card .card-label .card-count-badge {
      position: static;
      display: inline;
      margin-right: 4px;
    }

    #oppZone {
      align-content: stretch;
    }

    .stack-panel {
      border: 1px solid #6284a8;
      background: linear-gradient(180deg, #172536, #101a27);
      padding: 8px;
      display: grid;
      gap: 6px;
      align-content: start;
    }

    .stack-panel h4 {
      margin: 0;
      color: #8ec4ff;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-size: 12px;
    }

    .stack-items {
      display: grid;
      gap: 6px;
      grid-auto-rows: min-content;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 2px;
      align-content: start;
    }


    .phase-track {
      border: 1px solid #42566f;
      background: #0e141d;
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      gap: 1px;
      min-height: 34px;
    }

    .phase-step {
      display: grid;
      align-items: center;
      justify-items: center;
      font-size: 12px;
      color: #96abc7;
      border-right: 1px solid #1d2a3b;
      text-transform: uppercase;
      letter-spacing: 0.38px;
    }

    .phase-step.active {
      color: #f3f9ff;
      background: linear-gradient(180deg, #4475a8, #2b4e73);
      font-weight: 700;
    }

    .hand-zone {
      border: 1px solid #41566f;
      background: #10161f;
      padding: 8px;
      display: grid;
      gap: 7px;
    }

    .hand-zone h3 {
      margin: 0;
      color: #a4bdd7;
      text-transform: uppercase;
      letter-spacing: 0.55px;
      font-size: 12px;
      font-weight: 600;
    }

    .hand-strip,
    .card-row {
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
      overflow-x: auto;
      padding-bottom: 2px;
      min-height: 176px;
      align-items: flex-end;
    }

    .card-row {
      min-height: 166px;
      align-items: flex-start;
    }

    #myZone {
      overflow: hidden;
      grid-template-rows: minmax(0, 1fr);
      align-content: stretch;
    }

    #myZone .battlefield-row {
      overflow-y: hidden;
    }

    .card {
      width: 124px;
      min-width: 124px;
      min-height: 172px;
      border: 1px solid #61758d;
      background:
        linear-gradient(180deg, rgba(13, 20, 30, 0.92), rgba(7, 12, 18, 0.94)),
        repeating-linear-gradient(145deg, rgba(255,255,255,0.06) 0 2px, transparent 2px 6px);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
      padding: 6px;
      font-size: 12px;
      line-height: 1.2;
      font-weight: 700;
      color: #d8e8ff;
      display: grid;
      align-content: start;
      user-select: none;
      cursor: default;
      position: relative;
      overflow: hidden;
      transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
    }

    .card-art {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.72;
      z-index: 0;
      pointer-events: none;
      filter: saturate(1.05) contrast(1.04);
    }


    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(4, 8, 14, 0.22), rgba(4, 8, 14, 0.7));
      z-index: 0;
      pointer-events: none;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .card-label {
      margin-top: auto;
      line-height: 1.12;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.85);
    }

    .card-count-badge {
      position: absolute;
      top: 4px;
      left: 4px;
      border: 1px solid rgba(245, 198, 112, 0.9);
      background: rgba(16, 24, 35, 0.92);
      color: #f5d08b;
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 2px;
      z-index: 2;
      letter-spacing: 0.3px;
    }

    .card-pt-badge {
      position: absolute;
      bottom: 4px;
      right: 4px;
      border: 1px solid rgba(245, 198, 112, 0.9);
      background: rgba(16, 24, 35, 0.92);
      color: #f5d08b;
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 2px;
      z-index: 2;
      letter-spacing: 0.3px;
    }

    .card-scryfall-link {
      position: absolute;
      top: 4px;
      right: 4px;
      border: 1px solid #4e6f93;
      background: #0a1118;
      color: #9ec3ea;
      text-decoration: none;
      text-transform: uppercase;
      font-size: 9px;
      letter-spacing: 0.4px;
      padding: 1px 4px;
      border-radius: 2px;
      line-height: 1.2;
      z-index: 2;
      opacity: 0;
      transition: opacity 120ms ease;
    }

    .card-scryfall-link:hover {
      border-color: #7da8d6;
      color: #d8ecff;
      background: #112033;
    }

    .card:hover .card-scryfall-link,
    .card:focus-within .card-scryfall-link,
    .card.inspected .card-scryfall-link {
      opacity: 1;
    }

    .card.compact {
      width: 96px;
      min-width: 96px;
      min-height: 134px;
      padding: 4px;
      font-size: 11px;
    }

    .card.compact.back {
      width: 92px;
      min-width: 92px;
      min-height: 126px;
    }

    .stack-card {
      width: 106px;
      min-width: 106px;
      min-height: 90px;
      font-size: 11px;
      border-color: #80a8d7;
      background: linear-gradient(180deg, #132237, #0d1726);
    }

    .card-art-stack {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 0;

  <script type="module">
    async function importModuleScript(url) {
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const contentType = response.headers.get("content-type") || "unknown";
      const scriptText = await response.text();
      const probe = scriptText.trimStart().slice(0, 64).toLowerCase();
      if (probe.startsWith("<!doctype") || probe.startsWith("<html")) {
        throw new Error(
          `Received HTML instead of JS (status ${response.status}, content-type ${contentType})`
        );
      }

      // Import through a blob URL so the browser doesn't reject valid JS when
      // the server serves an incorrect module MIME type.
      const blobUrl = URL.createObjectURL(
        new Blob([scriptText], { type: "text/javascript" })
      );
      try {
        return await import(blobUrl);
      } finally {
        URL.revokeObjectURL(blobUrl);
      }
    }

    async function loadWasmModule() {
      const pathname = window.location.pathname;
      const baseDir = (() => {
        if (pathname.endsWith("/")) {
          return pathname;
        }
        if (pathname.includes(".")) {
          return pathname.slice(0, pathname.lastIndexOf("/") + 1);
        }
        return `${pathname}/`;
      })();

      const candidates = [
        `${window.location.origin}${baseDir}pkg/ironsmith.js`,
        `${window.location.origin}${baseDir}pkg/maishik.js`,
        `${window.location.origin}${baseDir}pkg/pkg/ironsmith.js`,
        `${window.location.origin}${baseDir}pkg/pkg/maishik.js`,
        "./pkg/ironsmith.js",
        "./pkg/maishik.js",
        "./pkg/pkg/ironsmith.js",
        "./pkg/pkg/maishik.js",
        "../../pkg/ironsmith.js",
        "../../pkg/maishik.js",
      ];
      const errors = [];
      for (const path of candidates) {
        const bust = `v=${Date.now()}-${Math.floor(Math.random() * 1e9)}`;
        const attempts = [`${path}?${bust}`, path];
        try {
          let lastErr = null;
          for (const attempt of attempts) {
            const resolvedUrl = new URL(attempt, window.location.href).href;
            try {
              const mod = await importModuleScript(resolvedUrl);
              const wasmPath = resolvedUrl
                .replace(/\?.*$/, "")
                .replace(/\.js$/i, "_bg.wasm");
              return { mod, wasmPath };
            } catch (innerErr) {
              lastErr = `${resolvedUrl}: ${innerErr}`;
            }
          }
          if (lastErr) {
            throw new Error(lastErr);
          }
        } catch (err) {
          errors.push(`${path}: ${err}`);
          // Try next path.
        }
      }
      throw new Error(`Could not load wasm JS module. Tried: ${errors.join(" | ")}`);
    }

      const query = String(cardName || "").trim();
      if (!query) {
        return "";

      const params = new URLSearchParams({
        fuzzy: query,
        format: "image",
        version: version
      });
      return `https://api.scryfall.com/cards/named?${params.toString()}`;

          const safeAmount = Number.isFinite(amount) && amount > 0 ? Math.floor(amount) : 0;

          return `<span class="mana-chip" title="${safeAmount} ${escapeHtml(label)} mana in pool"><img class="mana-symbol" src="${escapeHtml(svg)}" alt="{${symbol}}" loading="lazy" referrerpolicy="no-referrer" /><span class="mana-count">${safeAmount}</span></span>`;

      return `<div class="mana-pool">${chips.join("")}</div>`;

      if (step === "End") return "End";
      if (step === "Cleanup") return "Cleanup";
      if (phase === "FirstMain") return "Main";
      if (phase === "NextMain") return "Main2";

            : "";

    function fitBattlefieldRows() {
      const aspect = 124 / 96;
      const gap = 6;
      document.querySelectorAll(".battlefield-row").forEach((row) => {
        const cards = Array.from(row.querySelectorAll(".card.object-card"));
        if (!cards.length) {
          row.style.removeProperty("--bf-cols");
          row.style.removeProperty("--bf-card-width");
          row.style.removeProperty("--bf-card-height");
          return;
        }

        const width = row.clientWidth;
        const height = row.clientHeight;
        if (width <= 0 || height <= 0) {
          return;
        }

        const compact = row.closest(".opponent-slot") !== null;
        const minWidth = compact ? 30 : 44;
        const minHeight = compact ? 42 : 34;
        const maxRows = Math.min(cards.length, compact ? 8 : 10);

        let best = null;
        for (let rows = 1; rows <= maxRows; rows += 1) {
          const cols = Math.ceil(cards.length / rows);
          const widthLimit = (width - ((cols - 1) * gap)) / cols;
          const heightLimit = ((height - ((rows - 1) * gap)) / rows) * aspect;
          const cardWidth = Math.floor(Math.min(widthLimit, heightLimit));
          const cardHeight = Math.floor(cardWidth / aspect);
          if (!Number.isFinite(cardWidth) || !Number.isFinite(cardHeight)) {
            continue;
          }
          if (cardWidth < minWidth || cardHeight < minHeight) {
            continue;
          }
          if (!best || cardWidth > best.cardWidth) {
            best = { rows, cols, cardWidth, cardHeight };
          }
        }

        if (!best) {
          const rows = maxRows;
          const cols = Math.ceil(cards.length / rows);
          const widthLimit = (width - ((cols - 1) * gap)) / cols;
          const heightLimit = ((height - ((rows - 1) * gap)) / rows) * aspect;
          const cardWidth = Math.max(22, Math.floor(Math.min(widthLimit, heightLimit)));
          const cardHeight = Math.max(30, Math.floor(cardWidth / aspect));
          best = { rows, cols, cardWidth, cardHeight };
        }

        row.style.setProperty("--bf-cols", String(best.cols));
        row.style.setProperty("--bf-card-width", `${best.cardWidth}px`);
        row.style.setProperty("--bf-card-height", `${best.cardHeight}px`);
      });
    }

    function handCards(player, dragInfo, isPerspective) {
      if (player.can_view_hand) {
        if (!player.hand_cards.length) {
          return "";
        }
        return player.hand_cards
          .map((card) => {
            const plays = isPerspective ? (dragInfo.playable.get(Number(card.id)) || []) : [];
            const play = plays.length === 1 ? plays[0] : null;
            const playable = !!play;
            const hasMultiplePlays = plays.length > 1;
            const baseAttrs = `data-object-id="${card.id}" data-card-id="${card.id}" data-card-name="${escapeHtml(card.name)}"`;
            const attrs = playable
              ? `draggable="true" ${baseAttrs} data-action-index="${play.index}" data-to-zone="${play.to_zone}"`
              : baseAttrs;
            const hint = playable
              ? `<span class="drop-hint">Drop to ${escapeHtml(play.to_zone)}</span>`
              : (hasMultiplePlays ? `<span class="drop-hint">Click for actions</span>` : "");
            return `<div class="card hand-card ${playable ? "playable" : ""}" ${attrs}><span class="card-label">${escapeHtml(card.name)}</span>${cardArtImage(card.name)}${cardScryfallLink(card.name)}${hint}</div>`;
          })
          .join("");
      }

      const backs = Math.min(player.hand_size, 8);
      if (!backs) {
        return "";
      }
      return Array.from({ length: backs }, () => `<div class="card back">Card</div>`).join("");
    }

    function renderStack() {
      const objects = state.stack_objects || [];
      const previews = state.stack_preview || [];
      if (!objects.length && !previews.length) {
        el.stackItems.innerHTML = "";

      // Prefer rich stack_objects; fall back to stack_preview names
      if (objects.length) {
        el.stackItems.innerHTML = objects
          .map((entry) => {
            const name = entry.name || `Object#${entry.id}`;
            const safeName = escapeHtml(name);
            let detailHtml;
            if (entry.ability_kind) {
              // Abilities: compact label, no full effect text
              detailHtml = `<span class="stack-ability-label">${escapeHtml(entry.ability_kind)} ability</span>`;
            } else {
              // Spells: show compiled effect text
              detailHtml = entry.effect_text
                ? `<span class="stack-effect">${escapeHtml(entry.effect_text)}</span>`
                : "";
            }
            const attrs = `data-object-id="${entry.id}" data-card-name="${safeName}"`;
            return `<div class="card stack-card object-card" ${attrs}>${cardArtImageStack(name)}${cardScryfallLink(name)}<span class="card-label">${safeName}</span>${detailHtml}</div>`;
          })
          .join("");
      } else {
        el.stackItems.innerHTML = previews
          .map((name) => {
            const safeName = escapeHtml(name);
            return `<div class="card stack-card" data-card-name="${safeName}">${cardArtImageStack(name)}${cardScryfallLink(name)}<span class="card-label">${safeName}</span></div>`;
          })
          .join("");
      }
    }

    function zoneCardsListMarkup(cards, emptyLabel) {
      if (!cards || !cards.length) {
        return `<div class="zone-empty-message">${escapeHtml(emptyLabel)}</div>`;

      return cards
        .map((card) => {
          const safeName = escapeHtml(card.name);
          return `<div class="card compact object-card" data-object-id="${card.id}" data-card-name="${safeName}">${cardArtImage(card.name)}${cardScryfallLink(card.name)}<span class="card-label">${safeName}</span></div>`;
        })
        .join("");
    }

    function handBacksMarkup(handSize) {
      const backs = Math.min(handSize, 8);
      if (!backs) {
        return `<div class="zone-empty-message">Empty hand</div>`;
      }
      return Array.from({ length: backs }, () => `<div class="card back">Card</div>`).join("");
    }

    function opponentZoneSlotContent(player, zone) {
      switch (zone) {
        case "battlefield":
          return {
            subtitle: `${battlefieldPermanentCount(player.battlefield)} permanents`,
            content: `<div class="card-row battlefield-row">${battlefieldCards(player.battlefield, { compact: true })}</div>`,
          };
        case "hand":
          return {
            subtitle: `${player.hand_size} cards`,
            content: `<div class="card-row">${handBacksMarkup(player.hand_size)}</div>`,
          };
        case "graveyard": {
          const cards = Array.isArray(player.graveyard_cards) ? player.graveyard_cards : [];
          return {
            subtitle: `${cards.length} cards`,
            content: `<div class="card-row">${zoneCardsListMarkup(cards, "Empty graveyard")}</div>`,
          };
        }
        case "exile": {
          const cards = Array.isArray(player.exile_cards) ? player.exile_cards : [];
          return {
            subtitle: `${cards.length} cards`,
            content: `<div class="card-row">${zoneCardsListMarkup(cards, "Empty exile")}</div>`,
          };
        }
        default:
          return { subtitle: "", content: "" };
      }
    }

    function opponentZoneMarkup(opponents, zone) {
      if (!opponents.length) {
        return "";
      }

      return opponents
        .map((player) => {
          const slot = opponentZoneSlotContent(player, zone);
          return `
          <article class="opponent-slot" data-player-id="${player.id}">
            <div class="opponent-slot-head">
              <span class="opponent-slot-name">${escapeHtml(player.name)}</span>
              <span class="subtle">${slot.subtitle}</span>
            </div>
            ${slot.content}
          </article>
        `;
        })
        .join("");
    }

    function myZoneMarkup(me, zone, dragInfo) {
      switch (zone) {
        case "battlefield":
          return battlefieldCards(me.battlefield);
        case "hand":
          return handCards(me, dragInfo, true);
        case "graveyard": {
          const cards = Array.isArray(me.graveyard_cards) ? me.graveyard_cards : [];
          return zoneCardsListMarkup(cards, "Empty graveyard");
        }
        case "exile": {
          const cards = Array.isArray(me.exile_cards) ? me.exile_cards : [];
          return zoneCardsListMarkup(cards, "Empty exile");
        }
        default:
          return "";
      }
    }

    function setLogDrawerOpen(isOpen) {
      el.logDrawer.classList.toggle("open", !!isOpen);
      el.logToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
      el.logToggle.textContent = isOpen ? "Log ◂" : "Log";
    }

    function ensureActionPopover() {
      if (actionPopover) {
        return actionPopover;
      }
      actionPopover = document.createElement("div");
      actionPopover.className = "action-popover";
      actionPopover.style.display = "none";
      document.body.appendChild(actionPopover);
      return actionPopover;
    }

    function hideActionPopover() {
      if (!actionPopover) {
        return;
      }
      actionPopover.style.display = "none";
      actionPopover.innerHTML = "";
      actionPopoverAnchorObject = null;
    }

    function decisionForPerspective() {
      const decision = state && state.decision;
      if (!decision) {
        return null;
      }
      return decision.player === state.perspective ? decision : null;
    }

    function priorityActionsByObject(decision) {
      const grouped = new Map();
      if (!decision || decision.kind !== "priority") {
        return grouped;
      }
      for (const action of decision.actions || []) {
        if (action.object_id === null || action.object_id === undefined) {
          continue;
        }
        const objectId = Number(action.object_id);
        if (!Number.isFinite(objectId)) {
          continue;
        }
        if (!grouped.has(objectId)) {
          grouped.set(objectId, []);
        }
        grouped.get(objectId).push(action);
      }
      return grouped;
    }

    function visibleObjectIdsInUi() {
      const ids = new Set();
      if (!state || !Array.isArray(state.players)) {
        return ids;
      }

      for (const player of state.players) {
        for (const card of player.hand_cards || []) {
          ids.add(Number(card.id));
        }
        for (const card of player.graveyard_cards || []) {
          ids.add(Number(card.id));
        }
        for (const card of player.exile_cards || []) {
          ids.add(Number(card.id));
        }
        for (const permanent of player.battlefield || []) {
          const memberIds = Array.isArray(permanent.member_ids) ? permanent.member_ids : [];
          if (memberIds.length) {
            memberIds.forEach((id) => ids.add(Number(id)));
          } else if (permanent.id !== null && permanent.id !== undefined) {
            ids.add(Number(permanent.id));
          }
        }
      }

      for (const entry of state.stack_objects || []) {
        ids.add(Number(entry.id));
      }

      return ids;
    }

    function interactiveTargetingSupported(decision) {
      if (!decision || decision.kind !== "targets") {
        return false;
      }
      return (decision.requirements || []).every((req) => req.max_targets === 1);
    }

    function targetsDecisionSignature(decision) {
      return JSON.stringify((decision.requirements || []).map((req) => ({
        min: req.min_targets,
        max: req.max_targets,
        legal: (req.legal_targets || []).map((target) => target.kind === "player"
          ? `p:${target.player}`
          : `o:${target.object}`)
      })));
    }

    function ensureTargetingDraft(decision) {
      const sig = targetsDecisionSignature(decision);
      if (!targetingDraft || targetingDraft.signature !== sig) {
        targetingDraft = {
          signature: sig,
          index: 0,
          selections: []
        };
      }
      return targetingDraft;
    }

    function attackersDecisionSignature(decision) {
      return JSON.stringify((decision.attacker_options || []).map((opt) => ({
        creature: opt.creature,
        must: !!opt.must_attack,
        targets: (opt.valid_targets || []).map((target) => target.kind === "player"
          ? `p:${target.player}`
          : `w:${target.object}`)
      })));
    }

    function ensureAttackersDraft(decision) {
      const sig = attackersDecisionSignature(decision);
      if (!attackersDraft || attackersDraft.signature !== sig) {
        const assignments = new Map();
        for (const opt of decision.attacker_options || []) {
          if (!opt.must_attack) {
            continue;
          }
          const first = (opt.valid_targets || [])[0];
          if (!first) {
            continue;
          }
          assignments.set(Number(opt.creature), decodeAttackTargetChoice(first));
        }
        attackersDraft = {
          signature: sig,
          assignments,
          activeCreature: Number((decision.attacker_options || [])[0]?.creature ?? NaN)
        };
      }
      return attackersDraft;
    }

    function blockersDecisionSignature(decision) {
      return JSON.stringify((decision.blocker_options || []).map((opt) => ({
        attacker: opt.attacker,
        min: opt.min_blockers,
        blockers: (opt.valid_blockers || []).map((b) => b.id)
      })));
    }

    function ensureBlockersDraft(decision) {
      const sig = blockersDecisionSignature(decision);
      if (!blockersDraft || blockersDraft.signature !== sig) {
        blockersDraft = {
          signature: sig,
          assignments: new Map(),
          activeAttacker: Number((decision.blocker_options || [])[0]?.attacker ?? NaN)
        };
      }
      return blockersDraft;
    }

    function clearInteractionDrafts() {
      targetingDraft = null;
      attackersDraft = null;
      blockersDraft = null;
    }

    function getDragInfo() {
      const info = {
        enabled: false,
        playable: new Map()
      };

      const decision = state && state.decision;
      if (!decision || decision.kind !== "priority") {
        return info;
      }
      if (decision.player !== state.perspective) {
        return info;
      }

      info.enabled = true;
      for (const action of decision.actions || []) {
        if ((action.kind === "cast_spell" || action.kind === "play_land")
          && action.object_id !== null
          && action.to_zone) {
          const objectId = Number(action.object_id);
          if (!info.playable.has(objectId)) {
            info.playable.set(objectId, []);
          }
          info.playable.get(objectId).push(action);
        }
      }
      return info;
    }

    function openCardActionPopover(anchorEl, objectId, actions) {
      if (!actions || !actions.length) {
        hideActionPopover();
        return;
      }
      const pop = ensureActionPopover();
      pop.innerHTML = "";
      actionPopoverAnchorObject = Number(objectId);

      const head = document.createElement("div");
      head.className = "action-popover-head";
      head.textContent = "Available actions";
      pop.appendChild(head);

      for (const action of actions) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "action-popover-btn";
        btn.textContent = action.label;
        btn.addEventListener("click", async (ev) => {
          ev.preventDefault();
          ev.stopPropagation();
          hideActionPopover();
          await sendCommand({ type: "priority_action", action_index: action.index }, action.label);
        });
        pop.appendChild(btn);
      }

      pop.style.display = "grid";
      const rect = anchorEl.getBoundingClientRect();
      const maxLeft = window.innerWidth - 16;
      const desiredLeft = Math.min(rect.left + 10, maxLeft - 260);
      const desiredTop = Math.min(rect.bottom + 8, window.innerHeight - 120);
      pop.style.left = `${Math.max(8, desiredLeft)}px`;
      pop.style.top = `${Math.max(8, desiredTop)}px`;
    }

    function applyPriorityActionHighlights(decision) {
      const grouped = priorityActionsByObject(decision);
      if (!grouped.size) {
        hideActionPopover();
      }
      document.querySelectorAll(".card[data-object-id], .side-zone-entry[data-object-id]").forEach((node) => {
        const objectId = Number(node.getAttribute("data-object-id"));
        if (!Number.isFinite(objectId)) {
          return;
        }
        // For grouped cards, check all member IDs for actions
        let actions = grouped.get(objectId);
        if (!actions || !actions.length) {
          const memberAttr = node.getAttribute("data-member-ids");
          if (memberAttr) {
            const memberIds = memberAttr.split(",").map(Number).filter(Number.isFinite);
            for (const mid of memberIds) {
              actions = grouped.get(mid);
              if (actions && actions.length) break;
            }
          }
        }
        if (!actions || !actions.length) {
          return;
        }
        node.classList.add("actionable");
        node.addEventListener("click", (ev) => {
          ev.preventDefault();
          ev.stopPropagation();
          openCardActionPopover(node, objectId, actions);
          if (node.classList.contains("card")) {
            inspectObject(objectId);
          }
        });
      });
    }

    function applyTargetsInteraction(decision) {
      if (!interactiveTargetingSupported(decision)) {
        return false;
      }
      const draft = ensureTargetingDraft(decision);
      const requirements = decision.requirements || [];
      if (draft.index >= requirements.length) {
        return true;
      }
      const req = requirements[draft.index];
      const legalObjects = new Set();
      const legalPlayers = new Set();
      for (const target of req.legal_targets || []) {
        if (target.kind === "player") {
          legalPlayers.add(Number(target.player));
        } else {
          legalObjects.add(Number(target.object));
        }
      }

      const chooseTarget = (targetValue) => {
        draft.selections.push(targetValue);
        draft.index += 1;
        if (draft.index >= requirements.length) {
          const selected = draft.selections.slice();
          targetingDraft = null;
          void sendCommand({ type: "select_targets", targets: selected }, "Targets selected");
          return;
        }
        render();
      };

      document.querySelectorAll(".card[data-object-id], .side-zone-entry[data-object-id]").forEach((node) => {
        const objectId = Number(node.getAttribute("data-object-id"));
        if (!legalObjects.has(objectId)) {
          return;
        }
        node.classList.add("target-legal");
        node.addEventListener("click", (ev) => {
          ev.preventDefault();
          ev.stopPropagation();
          chooseTarget({ kind: "object", object: objectId });
        });
      });

      document.querySelectorAll(".side-player[data-player-id], .opponent-slot[data-player-id]").forEach((node) => {
        const playerId = Number(node.getAttribute("data-player-id"));
        if (!legalPlayers.has(playerId)) {
          return;
        }
        node.classList.add("target-legal");
        node.addEventListener("click", (ev) => {
          ev.preventDefault();
          ev.stopPropagation();
          chooseTarget({ kind: "player", player: playerId });
        });
      });
      return true;
    }

    function applyAttackersInteraction(decision) {
      const draft = ensureAttackersDraft(decision);
      const optionsByCreature = new Map((decision.attacker_options || []).map((opt) => [Number(opt.creature), opt]));
      const optionOrder = (decision.attacker_options || []).map((opt) => Number(opt.creature));

      document.querySelectorAll(".card[data-object-id]").forEach((node) => {
        const objectId = Number(node.getAttribute("data-object-id"));
        const option = optionsByCreature.get(objectId);
        if (!option) {
          return;
        }
        node.classList.add("attack-candidate");
        if (draft.assignments.has(objectId)) {
          node.classList.add("attack-selected");
        }
        if (draft.activeCreature === objectId) {
          node.classList.add("attack-active");
        }
        node.addEventListener("click", (ev) => {
          ev.preventDefault();
          ev.stopPropagation();
          draft.activeCreature = objectId;
          render();
        });
      });

      for (const option of decision.attacker_options || []) {
        const choice = draft.assignments.get(Number(option.creature));
        if (!choice) {
          continue;
        }
        if (choice.kind === "player") {
          const playerId = Number(choice.player);
          document.querySelectorAll(`.side-player[data-player-id="${playerId}"], .opponent-slot[data-player-id="${playerId}"]`).forEach((node) => {
            node.classList.add("attack-target-selected");
          });
          continue;
        }
        const planeswalkerId = Number(choice.object);
        document.querySelectorAll(`.card[data-object-id="${planeswalkerId}"]`).forEach((node) => {
          node.classList.add("attack-target-selected");
        });
      }

      const activeOption = optionsByCreature.get(Number(draft.activeCreature));
      if (!activeOption) {
        return true;
      }
      const assignTarget = (targetValue) => {
        draft.assignments.set(Number(activeOption.creature), targetValue);
        const nextCreature = optionOrder.find((creatureId) => {
          if (creatureId === Number(activeOption.creature)) {
            return false;
          }
          return !draft.assignments.has(creatureId);
        });
        draft.activeCreature = Number.isFinite(nextCreature)
          ? Number(nextCreature)
          : Number(activeOption.creature);
        render();
      };

      for (const target of activeOption.valid_targets || []) {
        if (target.kind === "player") {
          const playerId = Number(target.player);
          document.querySelectorAll(`.side-player[data-player-id="${playerId}"], .opponent-slot[data-player-id="${playerId}"]`).forEach((node) => {
            node.classList.add("attack-target-legal");
            node.addEventListener("click", (ev) => {
              ev.preventDefault();
              ev.stopPropagation();
              assignTarget({ kind: "player", player: playerId });
            });
          });
        } else {
          const planeswalkerId = Number(target.object);
          document.querySelectorAll(`.card[data-object-id="${planeswalkerId}"]`).forEach((node) => {
            node.classList.add("attack-target-legal");
            node.addEventListener("click", (ev) => {
              ev.preventDefault();
              ev.stopPropagation();
              assignTarget({ kind: "planeswalker", object: planeswalkerId });
            });
          });
        }
      }
      return true;
    }

    function applyBlockersInteraction(decision) {
      const draft = ensureBlockersDraft(decision);
      const optionsByAttacker = new Map((decision.blocker_options || []).map((opt) => [Number(opt.attacker), opt]));

      document.querySelectorAll(".card[data-object-id]").forEach((node) => {
        const objectId = Number(node.getAttribute("data-object-id"));
        const attackerOpt = optionsByAttacker.get(objectId);
        if (!attackerOpt) {
          return;
        }
        node.classList.add("blocker-candidate");
        node.classList.add("blocker-attacker-candidate");
        if (draft.activeAttacker === objectId) {
          node.classList.add("blocker-attacker-active");
        }
        node.addEventListener("click", (ev) => {
          ev.preventDefault();
          ev.stopPropagation();
          draft.activeAttacker = objectId;
          render();
        });
      });

      const activeOption = optionsByAttacker.get(Number(draft.activeAttacker));
      if (!activeOption) {
        return true;
      }
      const legalBlockers = new Set((activeOption.valid_blockers || []).map((b) => Number(b.id)));
      document.querySelectorAll(".card[data-object-id]").forEach((node) => {
        const objectId = Number(node.getAttribute("data-object-id"));
        if (!legalBlockers.has(objectId)) {
          return;
        }
        node.classList.add("blocker-candidate");
        if (draft.assignments.get(objectId) === Number(activeOption.attacker)) {
          node.classList.add("blocker-selected");
        }
        node.addEventListener("click", (ev) => {
          ev.preventDefault();
          ev.stopPropagation();
          if (draft.assignments.get(objectId) === Number(activeOption.attacker)) {
            draft.assignments.delete(objectId);
          } else {
            draft.assignments.set(objectId, Number(activeOption.attacker));
          }
          render();
        });
      });
      return true;
    }

    function wireDecisionInteractions() {
      const decision = decisionForPerspective();
      if (!decision) {
        clearInteractionDrafts();
        hideActionPopover();
        return;
      }
      if (decision.kind === "priority") {
        targetingDraft = null;
        attackersDraft = null;
        blockersDraft = null;
        applyPriorityActionHighlights(decision);
        return;
      }
      hideActionPopover();
      if (decision.kind === "targets") {
        attackersDraft = null;
        blockersDraft = null;
        applyTargetsInteraction(decision);
        return;
      }
      if (decision.kind === "attackers") {
        targetingDraft = null;
        blockersDraft = null;
        applyAttackersInteraction(decision);
        return;
      }
      if (decision.kind === "blockers") {
        targetingDraft = null;
        attackersDraft = null;
        applyBlockersInteraction(decision);
        return;
      }
      clearInteractionDrafts();
    }

    function updateChangePlayerDropdown() {
      if (!state || !state.players) {
        return;
      }
      const current = state.perspective;
      const options = state.players.map((p) =>
        `<option value="${p.id}" ${p.id === current ? "selected" : ""}>${escapeHtml(p.name)}</option>`
      );
      el.changePlayer.innerHTML = options.join("");
    }

    function applyInspectorHighlight() {
      document.querySelectorAll(".card.inspected").forEach((card) => {
        card.classList.remove("inspected");
      });
      if (selectedObjectId === null || selectedObjectId === undefined) {
        return;
      }
      const selected = document.querySelector(`.card[data-object-id="${selectedObjectId}"]`);
      if (selected) {
        selected.classList.add("inspected");
      }
    }

    function renderObjectInspector(details) {
      const ownerName = playerName(Number(details.owner));
      const controllerName = playerName(Number(details.controller));
      const stats = [];
      if (details.power !== null && details.power !== undefined && details.toughness !== null && details.toughness !== undefined) {
        stats.push(`${details.power}/${details.toughness}`);
      }
      if (details.loyalty !== null && details.loyalty !== undefined) {
        stats.push(`Loyalty ${details.loyalty}`);
      }
      if (details.tapped) {
        stats.push("Tapped");
      }

      const counterLine = (details.counters || []).length
        ? details.counters.map((c) => `${c.amount} ${c.kind}`).join(" • ")
        : "";

      const oracle = details.oracle_text && details.oracle_text.trim().length
        ? escapeHtml(details.oracle_text)
        : "No oracle text available.";

      const abilities = (details.abilities || []).length
        ? `<ul class="ability-list">${details.abilities.map((line) => `<li>${escapeHtml(line)}</li>`).join("")}</ul>`
        : "No compiled oracle text available.";

      const rawCompilation = details.raw_compilation
        ? escapeHtml(details.raw_compilation)
        : "No raw compilation available.";

      const ownerCtrl = ownerName === controllerName
        ? ownerName
        : `Owner: ${ownerName} • Ctrl: ${controllerName}`;
      el.inspectorMeta.textContent = `${details.zone} • ${details.kind} • ${ownerCtrl}`;
      el.inspectorBody.innerHTML = `
        <h4 class="inspector-name">${escapeHtml(details.name)}</h4>
        <div class="inspector-type">${escapeHtml(details.type_line || "Object")}</div>
        <div class="inspector-quick">${escapeHtml(stats.length ? stats.join(" • ") : "No combat stats")} • Mana ${escapeHtml(details.mana_cost || "None")}${counterLine ? ` • Counters: ${escapeHtml(counterLine)}` : ""}</div>
        <div class="inspector-details">
          <div class="oracle-text">${oracle}</div>
          <details class="inspector-collapsible">
            <summary>Compiled oracle text</summary>
            <div>${abilities}</div>
          </details>
          <details class="inspector-collapsible">
            <summary>Raw compilation</summary>
            <pre class="raw-compilation">${rawCompilation}</pre>
          </details>
        </div>
      `;

      updateRightRailState();
      applyInspectorHighlight();
    }

    function renderStackAbilityInspector(stackEntry) {
      const safeName = escapeHtml(stackEntry.name);
      const kind = escapeHtml(stackEntry.ability_kind);
      const abilityText = stackEntry.ability_text
        ? escapeHtml(stackEntry.ability_text)
        : "No ability text available.";

      el.inspectorMeta.textContent = `Stack • ${stackEntry.ability_kind} ability`;
      el.inspectorBody.innerHTML = `
        <h4 class="inspector-name">${safeName}</h4>
        <div class="inspector-type">${kind} ABILITY</div>
        <div class="inspector-details">
          <div class="oracle-text">${abilityText}</div>
        </div>
      `;

      updateRightRailState();
      applyInspectorHighlight();
    }

    function findStackEntry(objectId) {
      const objects = state && state.stack_objects ? state.stack_objects : [];
      return objects.find((e) => e.id === objectId) || null;
    }

    async function inspectObject(objectId) {
      const numericId = Number(objectId);
      if (!Number.isFinite(numericId)) {
        return;
      }
      selectedObjectId = numericId;
      if (!inspectorPanelOpen) {
        inspectorPanelOpen = true;
        updateRightRailState();
      }
      applyInspectorHighlight();

      // Check if this is a stack ability — render from stack data instead of objectDetails
      const stackEntry = findStackEntry(numericId);
      if (stackEntry && stackEntry.ability_kind) {
        renderStackAbilityInspector(stackEntry);
        return;
      }

      el.inspectorMeta.textContent = `Loading object #${numericId}...`;
      el.inspectorBody.innerHTML = "";

      try {
        const details = await game.objectDetails(BigInt(numericId));
        if (selectedObjectId !== numericId) {
          return;
        }
        renderObjectInspector(details);
      } catch (err) {
        if (selectedObjectId !== numericId) {
          return;
        }
        updateRightRailState();
        el.inspectorMeta.textContent = `Object #${numericId}`;
        el.inspectorBody.innerHTML = `<div class=\"inspector-meta\">${escapeHtml(String(err))}</div>`;
      }
    }

    function clearDecisionPanel(message) {
      el.decisionMeta.textContent = message;
      el.decisionBody.innerHTML = "";
    }

    function opponentHoldReason(decision) {
      if (!el.autoPassOpponent.checked) {
        return "auto-pass disabled";
      }
      if (!decision || decision.kind !== "priority") {
        return null;
      }
      if (decision.player === state.perspective) {
        return null;
      }

      const rule = el.opponentHoldRule.value || "never";
      if (rule === "never") {
        return null;
      }
      if (rule === "always") {
        return "always hold";
      }
      if (rule === "stack" && state.stack_size > 0) {
        return "stack non-empty";
      }
      if (rule === "main" && (state.phase === "FirstMain" || state.phase === "NextMain")) {
        return "main phase";
      }
      if (rule === "combat" && state.phase === "Combat") {
        return "combat phase";
      }
      if (rule === "ending" && state.phase === "Ending") {
        return "ending phase";
      }
      if (rule === "if_actions") {
        const hasNonPassAction = (decision.actions || []).some((a) => a.kind !== "pass_priority");
        if (hasNonPassAction) {
          return "opponent has playable actions";
        }
      }
      return null;
    }

    function defaultOpponentAttackerDeclarations(decision) {
      const declarations = [];
      for (const option of decision.attacker_options || []) {
        if (!option.must_attack) {
          continue;
        }
        const firstTarget = (option.valid_targets || [])[0];
        if (!firstTarget) {
          continue;
        }
        declarations.push({
          creature: Number(option.creature),
          target: decodeAttackTargetChoice(firstTarget)
        });
      }
      return declarations;
    }

    async function settleOpponentPriority() {
      if (!state || !el.autoPassOpponent.checked) {
        return { autoPasses: 0, autoDeclares: 0, phaseAdvances: 0, holdReason: null };
      }

      let autoPasses = 0;
      let autoDeclares = 0;
      let phaseAdvances = 0;
      let holdReason = null;
      const maxAutoPasses = 80;
      const maxAutoDeclares = 40;
      const maxPhaseAdvances = 24;

      for (let i = 0; i < maxPhaseAdvances; i++) {
        while (state && state.decision && state.decision.player !== state.perspective) {
          if (state.decision.kind === "priority") {
            holdReason = opponentHoldReason(state.decision);
            if (holdReason) {
              break;
            }

            const passAction = (state.decision.actions || []).find((a) => a.kind === "pass_priority");
            if (!passAction) {
              holdReason = "no pass action available";
              break;
            }

            if (autoPasses >= maxAutoPasses) {
              holdReason = "auto-pass safety limit reached";
              break;
            }

            state = await game.dispatch({ type: "priority_action", action_index: passAction.index });
            autoPasses += 1;
            continue;
          }

          if (autoDeclares >= maxAutoDeclares) {
            holdReason = "auto-declare safety limit reached";
            break;
          }

          if (state.decision.kind === "attackers") {
            const declarations = defaultOpponentAttackerDeclarations(state.decision);
            state = await game.dispatch({ type: "declare_attackers", declarations });
            autoDeclares += 1;
            continue;
          }
          if (state.decision.kind === "blockers") {
            state = await game.dispatch({ type: "declare_blockers", declarations: [] });
            autoDeclares += 1;
            continue;
          }

          holdReason = "opponent has non-priority decision";
          break;
        }

        if (holdReason) {
          break;
        }

        if (!state || state.game_over || state.decision) {
          break;
        }

        if (phaseAdvances >= maxPhaseAdvances) {
          holdReason = "phase auto-advance safety limit reached";
          break;
        }

        const before = `${state.turn_number}|${state.phase}|${state.step}|${state.priority_player}|${state.stack_size}`;
        game.advancePhase();
        phaseAdvances += 1;
        state = await game.uiState();
        const after = `${state.turn_number}|${state.phase}|${state.step}|${state.priority_player}|${state.stack_size}`;
        if (before === after) {
          holdReason = "advance phase made no progress";
          break;
        }
      }

      return { autoPasses, autoDeclares, phaseAdvances, holdReason };
    }

    function buildAutoPassStatus(autoResult) {
      if (!autoResult) {
        return "";
      }
      const parts = [];
      if (autoResult.autoPasses > 0) {
        parts.push("auto-passed opponent x" + autoResult.autoPasses);
      }
      if (autoResult.autoDeclares > 0) {
        parts.push("auto-declared combat x" + autoResult.autoDeclares);
      }
      if (autoResult.phaseAdvances > 0) {
        parts.push("auto-advanced phase x" + autoResult.phaseAdvances);
      }
      if (autoResult.holdReason && state && state.decision && state.decision.player !== state.perspective) {
        parts.push("holding opponent (" + autoResult.holdReason + ")");
      }
      return parts.length ? parts.join(" • ") : "";
    }

    function tryBuildAutoResolveCommand(decision) {
      if (!decision) return null;

      // SelectOptions: exactly 1 legal option and must pick exactly 1
      if (decision.kind === "select_options"
          && decision.min === 1 && decision.max === 1
          && !(decision.reason || "").toLowerCase().includes("order")) {
        const legal = (decision.options || []).filter((o) => o.legal);
        if (legal.length === 1) {
          return {
            cmd: { type: "select_options", option_indices: [legal[0].index] },
            label: `Auto: ${legal[0].description}`,
          };
        }
      }

      // SelectObjects: exactly min legal candidates and min === max (forced selection)
      if (decision.kind === "select_objects") {
        const legal = (decision.candidates || []).filter((c) => c.legal);
        if (legal.length > 0 && legal.length === decision.min && decision.min === decision.max) {
          return {
            cmd: { type: "select_objects", object_ids: legal.map((c) => c.id) },
            label: `Auto: ${legal.map((c) => c.name).join(", ")}`,
          };
        }
      }

      // Number: min === max (forced value)
      if (decision.kind === "number" && decision.min === decision.max) {
        return {
          cmd: { type: "number_choice", value: decision.min },
          label: `Auto: ${decision.min}`,
        };
      }

      // Targets: every requirement has exactly min_targets legal targets and min === max
      if (decision.kind === "targets") {
        const reqs = decision.requirements || [];
        if (reqs.length > 0 && reqs.every((req) => {
          const maxT = req.max_targets === null || req.max_targets === undefined
            ? req.legal_targets.length : Number(req.max_targets);
          return req.legal_targets.length > 0
            && req.legal_targets.length === req.min_targets
            && req.min_targets === maxT;
        })) {
          const targets = reqs.flatMap((req) =>
            req.legal_targets.map((t) =>
              t.kind === "player"
                ? { kind: "player", player: Number(t.player) }
                : { kind: "object", object: Number(t.object) }
            )
          );
          return {
            cmd: { type: "select_targets", targets },
            label: "Auto: targets selected",
          };
        }
      }

      return null;
    }

    async function autoResolveTrivialDecisions() {
      let resolved = 0;
      const maxAuto = 50;
      while (resolved < maxAuto && state && state.decision) {
        const auto = tryBuildAutoResolveCommand(state.decision);
        if (!auto) break;
        try {
          state = await game.dispatch(auto.cmd);
          resolved++;
          const autoResult = await settleOpponentPriority();
        } catch (err) {
          console.warn("Auto-resolve failed:", err);
          break;
        }
      }
      return resolved;
    }

    async function sendCommand(command, successMessage) {
      try {
        state = await game.dispatch(command);
        const autoResult = await settleOpponentPriority();
        const autoResolved = await autoResolveTrivialDecisions();
        render();
        const autoStatus = buildAutoPassStatus(autoResult);
        const parts = [successMessage, autoStatus, autoResolved ? `${autoResolved} auto-resolved` : null].filter(Boolean);
        if (parts.length) {
          setStatus(parts.join(" • "));
        }
      } catch (err) {
        try {
          state = await game.uiState();
          render();
        } catch (_refreshErr) {
          // Keep original dispatch error as primary signal.
        }
        setStatus("Action failed: " + err, true);
        console.error(err);
      }
    }

    function ensureCursorPlayGhost() {
      if (cursorPlayGhost) {
        return;

      cursorPlayGhost = document.createElement("div");
      cursorPlayGhost.className = "cursor-play-ghost";

    function updateCursorPlayGhostPosition(clientX, clientY) {
      if (!cursorPlayGhost || !selectedPlay) {
        return;

      cursorPlayGhost.style.left = `${clientX + 14}px`;
      cursorPlayGhost.style.top = `${clientY + 14}px`;

    function setSelectedPlay(cardEl, actionIndex, toZone) {
      clearSelectedPlay();
      selectedPlay = {
        cardEl,
        actionIndex,
        toZone,
        cardName: cardEl.dataset.cardName || cardEl.textContent.trim()
      };
      cardEl.classList.add("selected");

      ensureCursorPlayGhost();

      cursorPlayGhost.style.display = "block";

      const zones = Array.from(document.querySelectorAll(".drop-zone[data-drop-zone]"));
      zones.forEach((zone) => {

      });

    function clearSelectedPlay() {
      if (selectedPlay && selectedPlay.cardEl) {
        selectedPlay.cardEl.classList.remove("selected");
      }
      selectedPlay = null;
      const zones = Array.from(document.querySelectorAll(".drop-zone[data-drop-zone]"));
      zones.forEach((zone) => zone.classList.remove("hover"));
      if (cursorPlayGhost) {
        cursorPlayGhost.style.display = "none";
      }
    }

    function getPriorityActionByIndex(actionIndex) {
      const decision = state && state.decision;
      if (!decision || decision.kind !== "priority") {
        return null;
      }
      return (decision.actions || []).find((a) => Number(a.index) === Number(actionIndex)) || null;
    }

    async function animateCardToZone(cardEl, zoneEl) {
      const from = cardEl.getBoundingClientRect();
      const to = zoneEl.getBoundingClientRect();

      const ghost = cardEl.cloneNode(true);
      ghost.classList.add("drag-ghost");
      ghost.style.left = `${from.left}px`;
      ghost.style.top = `${from.top}px`;
      ghost.style.width = `${from.width}px`;
      ghost.style.height = `${from.height}px`;
      document.body.appendChild(ghost);

      const dx = (to.left + to.width / 2) - (from.left + from.width / 2);
      const dy = (to.top + to.height / 2) - (from.top + from.height / 2);

      requestAnimationFrame(() => {
        ghost.style.transform = `translate(${dx}px, ${dy}px) scale(0.85)`;
        ghost.style.opacity = "0.18";
      });

      return new Promise((resolve) => {
        setTimeout(() => {
          ghost.remove();
          resolve();
        }, 190);
      });
    }

    async function clickPlaySelectedToZone(zoneEl) {
      if (!selectedPlay) {
        return;
      }
      if (zoneEl.dataset.dropZone !== selectedPlay.toZone) {
        return;
      }

      const actionIndex = selectedPlay.actionIndex;
      const cardName = selectedPlay.cardName;
      const cardEl = selectedPlay.cardEl;
      clearSelectedPlay();
      await animateCardToZone(cardEl, zoneEl);
      await sendCommand({ type: "priority_action", action_index: actionIndex }, `Played ${cardName}`);
    }

    function wireDragAndDrop() {
      const cards = Array.from(document.querySelectorAll(".hand-card[draggable='true']"));
      const zones = Array.from(document.querySelectorAll(".drop-zone[data-drop-zone]"));
      let drag = null;

      zones.forEach((zone) => zone.classList.remove("valid", "hover"));
      cards.forEach((card) => {
        const targetZone = card.dataset.toZone;
        const validZone = zones.find((zone) => zone.dataset.dropZone === targetZone);
        if (validZone) {
          validZone.classList.add("valid");
        }
      });

      if (!globalPointerHandlersBound) {
        document.addEventListener("mousemove", (ev) => {
          updateCursorPlayGhostPosition(ev.clientX, ev.clientY);
        });
        document.addEventListener("keydown", (ev) => {
          if (ev.key === "Escape") {
            clearSelectedPlay();
            hideActionPopover();
            setLogDrawerOpen(false);
            if (inspectorPanelOpen) {
              inspectorPanelOpen = false;
              updateRightRailState();
            }
          }
        });
        document.addEventListener("click", (ev) => {
          if (actionPopover && actionPopover.style.display !== "none") {
            const inPopover = ev.target.closest(".action-popover");
            const inActionable = ev.target.closest(".card.actionable, .side-zone-entry.actionable");
            if (!inPopover && !inActionable) {
              hideActionPopover();
            }
          }
          if (!selectedPlay) {
            return;
          }
          const insidePlayableCard = ev.target.closest(".hand-card.playable");
          const insideDropZone = ev.target.closest(".drop-zone[data-drop-zone]");
          if (!insidePlayableCard && !insideDropZone) {
            clearSelectedPlay();
          }
        });
        globalPointerHandlersBound = true;
      }

      for (const card of cards) {
        card.addEventListener("click", (ev) => {
          const decision = decisionForPerspective();
          if (decision && decision.kind === "priority") {
            return;
          }
          ev.preventDefault();
          ev.stopPropagation();
          const actionIndex = Number(card.dataset.actionIndex);
          const toZone = card.dataset.toZone;
          inspectObject(card.dataset.objectId);
          if (selectedPlay && selectedPlay.cardEl === card) {
            clearSelectedPlay();
            return;
          }
          setSelectedPlay(card, actionIndex, toZone);
          updateCursorPlayGhostPosition(ev.clientX, ev.clientY);
        });

        card.addEventListener("dragstart", (ev) => {
          clearSelectedPlay();
          drag = {
            card,
            actionIndex: Number(card.dataset.actionIndex),
            toZone: card.dataset.toZone
          };
          card.classList.add("dragging");
          ev.dataTransfer.effectAllowed = "move";
          ev.dataTransfer.setData("text/plain", String(drag.actionIndex));
        });

        card.addEventListener("dragend", () => {
          card.classList.remove("dragging");
          zones.forEach((zone) => zone.classList.remove("hover"));
          drag = null;
        });
      }

      for (const zone of zones) {
        zone.addEventListener("click", async (ev) => {
          if (!selectedPlay) {
            return;
          }
          ev.preventDefault();
          ev.stopPropagation();
          await clickPlaySelectedToZone(zone);
        });

        zone.addEventListener("dragover", (ev) => {
          const activeDrag = drag;
          if (!activeDrag) {
            return;
          }
          if (zone.dataset.dropZone !== activeDrag.toZone) {
            return;
          }
          ev.preventDefault();
          ev.dataTransfer.dropEffect = "move";
          zone.classList.add("hover");
        });

        zone.addEventListener("dragleave", () => {
          zone.classList.remove("hover");
        });

        zone.addEventListener("drop", async (ev) => {
          ev.preventDefault();
          zone.classList.remove("hover");

          const transferred = ev.dataTransfer ? ev.dataTransfer.getData("text/plain") : "";
          let actionIndex = Number.parseInt(transferred, 10);
          if (Number.isNaN(actionIndex)) {
            actionIndex = drag ? drag.actionIndex : Number.NaN;
          }
          const action = Number.isFinite(actionIndex) ? getPriorityActionByIndex(actionIndex) : null;
          if (!action) {
            return;
          }
          if (zone.dataset.dropZone !== action.to_zone) {
            return;
          }

          const draggedCard = drag
            ? drag.card
            : document.querySelector(`.hand-card[data-action-index="${actionIndex}"]`);
          const cardName = draggedCard && draggedCard.dataset
            ? (draggedCard.dataset.cardName || draggedCard.textContent.trim())
            : action.label;
          if (draggedCard) {
            await animateCardToZone(draggedCard, zone);
          }
          drag = null;
          await sendCommand({ type: "priority_action", action_index: actionIndex }, `Played ${cardName}`);
        });
      }
    }

    function expandOptionCounts(countsByIndex) {
      const expanded = [];
      Object.entries(countsByIndex).forEach(([idx, count]) => {
        const index = Number(idx);
        const amount = Math.max(0, Math.floor(Number(count) || 0));
        for (let i = 0; i < amount; i += 1) {
          expanded.push(index);
        }
      });
      return expanded;
    }

    function renderSelectOptionsOrdering(decision, canAct) {
      const form = document.createElement("form");
      form.className = "choice-form";
      const scroll = document.createElement("div");
      scroll.className = "choice-scroll";
      form.appendChild(scroll);
      let order = (decision.options || []).map((opt) => Number(opt.index));

      const renderRows = () => {
        scroll.innerHTML = "";

        order.forEach((optionIndex, position) => {
          const option = (decision.options || []).find((opt) => Number(opt.index) === optionIndex);
          if (!option) {
            return;
          }
          const row = document.createElement("div");
          row.className = "choice-option";

          const label = document.createElement("span");
          label.textContent = `${position + 1}. ${option.description}`;
          row.appendChild(label);

          const up = createActionButton("Up", !canAct || position === 0, (ev) => {
            ev.preventDefault();
            if (position === 0) {
              return;
            }
            const tmp = order[position - 1];
            order[position - 1] = order[position];
            order[position] = tmp;
            renderRows();
          });
          const down = createActionButton("Down", !canAct || position === order.length - 1, (ev) => {
            ev.preventDefault();
            if (position >= order.length - 1) {
              return;
            }
            const tmp = order[position + 1];
            order[position + 1] = order[position];
            order[position] = tmp;
            renderRows();
          });
          row.appendChild(up);
          row.appendChild(down);
          scroll.appendChild(row);
        });
      };

      const submit = document.createElement("button");
      submit.type = "submit";
      submit.textContent = "Submit Order";
      submit.disabled = !canAct;
      form.appendChild(submit);

      form.addEventListener("submit", (ev) => {
        ev.preventDefault();
        sendCommand({ type: "select_options", option_indices: order.slice() }, "Order submitted");
      });

      renderRows();
      el.decisionBody.appendChild(form);
    }

    function renderSelectOptionsDistribute(decision, canAct) {
      const total = Number(decision.max || 0);

      scroll.className = "choice-scroll";

      decision.options.forEach((opt) => {

        row.innerHTML = `
          <span>${escapeHtml(opt.description)}</span>
          <input type="number" name="option_count_${opt.index}" min="0" max="${Math.max(0, maxCount)}" value="0" ${!opt.legal || !canAct ? "disabled" : ""}>

      submit.textContent = "Submit Distribution";
      submit.disabled = !canAct;

        decision.options.forEach((opt) => {
          const input = form.querySelector(`[name='option_count_${opt.index}']`);

          setStatus(`Select at least ${minChoices} option(s).`, true);

          setStatus(`Select at most ${maxChoices} option(s).`, true);
